org.gradle.jvmargs=-Xmx3G -XX:MaxMetaspaceSize=1G -XX:ReservedCodeCacheSize=256m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.enableJetifier=true

# Gradle daemon configuration to prevent connection failures
org.gradle.daemon=true
org.gradle.parallel=false
org.gradle.configureondemand=false
org.gradle.caching=true

# Kotlin daemon configuration
kotlin.daemon.jvmargs=-Xmx1g -XX:MaxMetaspaceSize=256m

# 16 KB page size support is handled in build.gradle.kts via packaging options
